  <g class="t"><circle cx="62" cy="430" r="24" fill="#DDEBFF"/><text x="53" y="438" font-size="26" fill="#0D47A1">i</text><text x="94" y="424" class="h">非公式アプリについて</text><text x="94" y="454" class="body">公開されている店舗情報をもとに、</text><text x="94" y="476" class="body">地図上で店舗を探しやすくするための</text><text x="94" y="498" class="body">非公式のサービスです。</text>
