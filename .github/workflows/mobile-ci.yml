name: Mobile CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATASET_BASE_URL: https://fromiron.github.io/koto-okaimono-doko
      EXPO_PUBLIC_DATASET_MANIFEST_URL: https://fromiron.github.io/koto-okaimono-doko/manifest.json
      GOOGLE_MAPS_API_KEY: local-ci-placeholder
    steps:
      # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # pnpm/action-setup@v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 10.33.2

      # actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm

      - name: Install Poppler
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm dataset:build
        timeout-minutes: 45

      - run: pnpm --dir apps/mobile exec expo install --check
