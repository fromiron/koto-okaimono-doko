name: Mobile CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_DATASET_MANIFEST_URL: https://example.github.io/koto-okaimono-doko/data/latest/manifest.json
      GOOGLE_MAPS_API_KEY: local-ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Poppler
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm dataset:build

      - run: pnpm --dir apps/mobile exec expo install --check
