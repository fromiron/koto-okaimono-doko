name: Build dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  push:
    branches: [main]
    paths:
      - "packages/dataset-cli/**"
      - "packages/core/**"
      - "packages/schema/**"
      - "data/corrections/**"
      - ".github/workflows/build-dataset.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Poppler
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - run: pnpm install --frozen-lockfile

      - run: pnpm dataset:build

      - run: pnpm dataset:test

      - uses: actions/upload-artifact@v4
        if: env.ACT != 'true'
        with:
          name: dataset-latest
          path: data/latest

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && env.ACT != 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: data/latest

  deploy-pages:
    if: github.event_name != 'pull_request'
    needs: build-dataset
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
