    <rect x="34" y="246" width="112" height="42" rx="21" fill="#F5A623"/><text x="90" y="275" text-anchor="middle" class="badge" fill="#fff">B券のみ</text><text x="90" y="314" text-anchor="middle" class="small">B券のみ使えます</text>
  </g>
  <g transform="translate(965 210)">
    <g filter="url(#soft)">
      <path d="M90 0c50 0 90 40 90 90 0 71-90 122-90 122S0 161 0 90C0 40 40 0 90 0z" fill="#666"/>
      <circle cx="90" cy="86" r="56" fill="#fff"/>
