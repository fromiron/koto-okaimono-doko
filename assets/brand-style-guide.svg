    </g>
    <rect x="35" y="246" width="110" height="42" rx="21" fill="#0D47A1"/><text x="90" y="275" text-anchor="middle" class="badge" fill="#fff">A・B券</text><text x="90" y="314" text-anchor="middle" class="small">A・B券 使えます</text>
