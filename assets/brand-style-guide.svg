<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="koto okaimono doko visual style guide">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0D47A1" flood-opacity="0.12"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#1E73D8"/><stop offset="1" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#FFC14A"/><stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#55D99D"/><stop offset="1" stop-color="#2DBE7F"/>
    </linearGradient>
    <style>
      .title{font:800 54px ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;fill:#0D47A1;letter-spacing:.3px}
      .sub{font:500 20px system-ui,-apple-system,BlinkMacSystemFont,sans-serif;fill:#333333}
      .h{font:800 22px system-ui,-apple-system,BlinkMacSystemFont,sans-serif;fill:#333333}
      .label{font:700 24px system-ui,-apple-system,BlinkMacSystemFont,sans-serif;fill:#333333}
      .small{font:500 16px system-ui,-apple-system,BlinkMacSystemFont,sans-serif;fill:#666}
      .badge{font:800 24px system-ui,-apple-system,BlinkMacSystemFont,sans-serif}
      .white{fill:#fff}.line{stroke:#E5E7EB;stroke-width:2;stroke-dasharray:5 7}.muted{fill:#E5E7EB}.road{stroke:#fff;stroke-width:14;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1200" height="900" fill="#FFFDF8"/>
  <text x="36" y="78" class="title">koto okaimono doko</text>
  <text x="38" y="115" class="sub">江東区のお買い物券が使えるお店を探せるマップアプリ（非公式）</text>

  <g transform="translate(730 40)" opacity=".9">
    <path d="M0 62h410" stroke="#CFE5F8" stroke-width="4" stroke-linecap="round"/>
    <path d="M30 62C58 26 118 26 148 62" fill="none" stroke="#2F74B9" stroke-width="5"/>
    <path d="M30 62V31M148 62V31" stroke="#2F74B9" stroke-width="5"/>
    <path d="M190 62V26h25v36M228 62V10h32v52M278 62V32h40v30" fill="#CFE5F8"/>
    <rect x="340" y="22" width="42" height="40" rx="2" fill="#E4D2B6"/>
    <path d="M392 62V0h15v62" fill="#7EA7CA"/>
    <circle cx="323" cy="54" r="12" fill="#72C674"/><circle cx="417" cy="54" r="13" fill="#72C674"/>
  </g>

