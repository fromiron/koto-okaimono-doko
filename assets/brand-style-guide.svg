    <text x="150" y="296" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">koto okaimono doko</text>
  </g>

  <text x="480" y="185" class="h">2. マップマーカー（ピン）</text>
  <g transform="translate(505 210)">
    <g filter="url(#soft)">
