    <rect x="190" y="0" width="165" height="48" rx="24" fill="#fff" stroke="#F5A623"/><rect x="214" y="15" width="36" height="20" rx="3" fill="#F5A623"/><text x="268" y="31" fill="#F5A623">B券のみ</text>
    <rect x="390" y="0" width="125" height="48" rx="24" fill="#fff" stroke="#2DBE7F"/><path d="M414 12h22v26h-22z" fill="none" stroke="#2DBE7F" stroke-width="4"/><text x="455" y="31" fill="#2DBE7F">紙</text>
    <rect x="550" y="0" width="165" height="48" rx="24" fill="#fff" stroke="#2DBE7F"/><rect x="575" y="11" width="18" height="28" rx="4" fill="none" stroke="#2DBE7F" stroke-width="4"/><text x="614" y="31" fill="#2DBE7F">デジタル</text>
