  <g transform="translate(65 740)" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
    <g><circle cx="52" cy="52" r="52" fill="#fff" filter="url(#soft)"/><circle cx="52" cy="52" r="15" fill="#0D47A1"/><circle cx="52" cy="52" r="34" fill="none" stroke="#0D47A1" stroke-width="5"/><path d="M52 10v18M52 76v18M10 52h18M76 52h18" stroke="#0D47A1" stroke-width="5" stroke-linecap="round"/><text x="52" y="132" font-size="18" font-weight="700" fill="#333">現在地ボタン</text><text x="52" y="157" font-size="16" fill="#333">（現在地）</text></g>
    <g transform="translate(185 0)"><circle cx="52" cy="52" r="52" fill="#fff" filter="url(#soft)"/><path d="M22 24h60L58 53v27H46V53z" fill="#0D47A1"/><text x="52" y="132" font-size="18" font-weight="700" fill="#333">フィルターボタン</text><text x="52" y="157" font-size="16" fill="#333">（絞り込み）</text></g>
    <g transform="translate(370 0)"><circle cx="52" cy="52" r="52" fill="#fff" filter="url(#soft)"/><path d="M52 20l8 10 13-2 5 12-8 10 8 10-5 12-13-2-8 10-8-10-13 2-5-12 8-10-8-10 5-12 13 2z" fill="#333"/><circle cx="52" cy="52" r="16" fill="#fff"/><text x="52" y="132" font-size="18" font-weight="700" fill="#333">設定ボタン</text><text x="52" y="157" font-size="16" fill="#333">（設定）</text></g>
    <g transform="translate(555 0)"><circle cx="52" cy="52" r="52" fill="#fff" filter="url(#soft)"/><path d="M24 58l62-34-22 64-14-23z" fill="#0D47A1"/><text x="52" y="132" font-size="18" font-weight="700" fill="#333">ルートボタン</text><text x="52" y="157" font-size="16" fill="#333">（経路案内）</text></g>
  </g>

  <text x="825" y="710" class="h">カラーガイド</text>
  <g transform="translate(830 745)">
    <circle cx="45" cy="32" r="26" fill="#0D47A1"/><circle cx="145" cy="32" r="26" fill="#F5A623"/><circle cx="245" cy="32" r="26" fill="#2DBE7F"/><circle cx="345" cy="32" r="26" fill="#333"/><circle cx="445" cy="32" r="26" fill="#E5E7EB"/>
    <g font-size="14" font-family="system-ui" fill="#333" text-anchor="middle"><text x="45" y="78">#0D47A1</text><text x="145" y="78">#F5A623</text><text x="245" y="78">#2DBE7F</text><text x="345" y="78">#333333</text><text x="445" y="78">#E5E7EB</text></g>
    <rect x="0" y="105" width="500" height="70" rx="16" fill="#F5F7FA"/><circle cx="38" cy="140" r="22" fill="#7BCFAE"/><path d="M28 136c0-7 9-10 14-4 5-6 14-3 14 4 0 10-14 18-14 18S28 146 28 136z" fill="#fff"/><text x="75" y="133" font-size="16" font-family="system-ui" fill="#333">地域に寄り添う、やさしく実用的なデザイン。</text><text x="75" y="158" font-size="16" font-family="system-ui" fill="#333">見やすく、使いやすいことを大切にしています。</text>
